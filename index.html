<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulletin Board</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --bg3:#1e293b;
      --panel:rgba(255,255,255,.08);
      --panel-2:rgba(255,255,255,.12);
      --border:rgba(255,255,255,.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#7c3aed;
      --accent-2:#a855f7;
      --danger:#ef4444;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --note-yellow:#fde68a;
      --note-pink:#f9a8d4;
      --note-blue:#93c5fd;
      --note-green:#86efac;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #312e81 0%, transparent 28%),
        radial-gradient(circle at top right, #4c1d95 0%, transparent 22%),
        radial-gradient(circle at bottom left, #0f766e 0%, transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
    }

    .board-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: auto;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.05), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.04), transparent 18%),
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: auto, auto, 34px 34px, 34px 34px;
      cursor: grab;
    }

    .board {
      position: relative;
      min-width: 2200px;
      min-height: 1400px;
    }

    .floating-ui {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: end;
      gap: 10px;
    }

    .status {
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(15,23,42,.7);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--muted);
    }

    .post-btn {
      border: 0;
      border-radius: 999px;
      padding: 16px 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(124,58,237,.45);
      transition: transform .12s ease, opacity .2s ease;
    }

    .post-btn:hover { opacity: .96; }
    .post-btn:active { transform: translateY(1px) scale(.99); }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(560px, 100%);
      background: rgba(15,23,42,.82);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0;
    }

    .close-btn {
      border: 0;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      color: white;
      background: rgba(124,58,237,.22);
      border-color: rgba(168,85,247,.4);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input[type="text"], textarea, select, input[type="file"] {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: white;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #94a3b8;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.secondary {
      background: rgba(255,255,255,.08);
      color: white;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .note, .file-card {
      position: absolute;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .note {
      width: 280px;
      min-height: 210px;
      padding: 18px 18px 24px;
      color: #111827;
      cursor: grab;
    }

    .note::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 58px;
      height: 18px;
      border-radius: 6px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .note.yellow { background: var(--note-yellow); }
    .note.pink { background: var(--note-pink); }
    .note.blue { background: var(--note-blue); }
    .note.green { background: var(--note-green); }

    .note-title {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-body {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .file-card {
      width: 360px;
      background: rgba(255,255,255,.97);
      color: #0f172a;
      cursor: grab;
    }

    .file-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(15,23,42,.04);
      border-bottom: 1px solid rgba(0,0,0,.06);
      font-size: 13px;
      font-weight: 800;
    }

    .file-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .file-body {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      background: #f8fafc;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .file-body img {
      display: block;
      max-width: 100%;
      max-height: 460px;
      object-fit: contain;
      background: white;
    }

    .pdf-frame {
      width: 100%;
      height: 460px;
      border: 0;
      background: white;
    }

    .hidden {
      display: none !important;
    }

    .tip {
      position: fixed;
      left: 22px;
      bottom: 22px;
      z-index: 900;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15,23,42,.7);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .tip { display: none; }
      .status { max-width: 220px; }
      .file-card { width: 320px; }
      .note { width: 250px; }
    }
  </style>
</head>
<body>
  <div id="boardWrap" class="board-wrap">
    <div id="board" class="board"></div>
  </div>

  <div class="floating-ui">
    <div id="status" class="status">Connecting…</div>
    <button id="openPostBtn" class="post-btn">+ Post</button>
  </div>

  <div class="tip">Drag items to move them.</div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <div class="modal-top">
        <h2 class="modal-title">Create Post</h2>
        <button id="closeModalBtn" class="close-btn">×</button>
      </div>

      <div class="tabs">
        <button id="tabNote" class="tab active">Post-it Note</button>
        <button id="tabFile" class="tab">PNG / PDF</button>
      </div>

      <div id="noteForm">
        <div class="field">
          <label for="noteTitle">Title</label>
          <input id="noteTitle" type="text" placeholder="Optional title" maxlength="80" />
        </div>
        <div class="field">
          <label for="noteText">Message</label>
          <textarea id="noteText" placeholder="Write something to pin..."></textarea>
        </div>
        <div class="field">
          <label for="noteColor">Color</label>
          <select id="noteColor">
            <option value="yellow">Yellow</option>
            <option value="pink">Pink</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
          </select>
        </div>
      </div>

      <div id="fileForm" class="hidden">
        <div class="field">
          <label for="fileInput">Choose PNG or PDF</label>
          <input id="fileInput" type="file" accept=".png,.pdf,image/png,application/pdf" />
        </div>
        <div class="field">
          <label for="fileTitle">Label</label>
          <input id="fileTitle" type="text" placeholder="Optional label" maxlength="120" />
        </div>
        <div class="field">
          <label>Note</label>
          <div style="font-size:13px;color:#94a3b8;line-height:1.4;">
            This Firestore-only version only supports small files because Firestore has a document size limit.
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="cancelBtn" class="btn secondary">Cancel</button>
        <button id="submitBtn" class="btn primary">Post</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import {
      getFirestore,
      collection,
      addDoc,
      doc,
      updateDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBv7Ywm0EBI0evZrvboljZ9N-UfkhYjzss",
      authDomain: "board-425b3.firebaseapp.com",
      projectId: "board-425b3",
      storageBucket: "board-425b3.firebasestorage.app",
      messagingSenderId: "447019362618",
      appId: "1:447019362618:web:010b9a459d3a7a0efe8803",
      measurementId: "G-2787Z00ZNE"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);

    const db = getFirestore(app);
    const auth = getAuth(app);

    const boardWrap = document.getElementById("boardWrap");
    const board = document.getElementById("board");
    const statusEl = document.getElementById("status");

    const modal = document.getElementById("modal");
    const openPostBtn = document.getElementById("openPostBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const submitBtn = document.getElementById("submitBtn");

    const tabNote = document.getElementById("tabNote");
    const tabFile = document.getElementById("tabFile");
    const noteForm = document.getElementById("noteForm");
    const fileForm = document.getElementById("fileForm");

    const noteTitle = document.getElementById("noteTitle");
    const noteText = document.getElementById("noteText");
    const noteColor = document.getElementById("noteColor");

    const fileInput = document.getElementById("fileInput");
    const fileTitle = document.getElementById("fileTitle");

    const itemsRef = collection(db, "boardItems");
    const itemsMap = new Map();

    let currentUid = null;
    let highestZ = 1;
    let mode = "note";
    let drag = null;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function openModal() {
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
    }

    function setMode(nextMode) {
      mode = nextMode;
      const noteActive = mode === "note";
      tabNote.classList.toggle("active", noteActive);
      tabFile.classList.toggle("active", !noteActive);
      noteForm.classList.toggle("hidden", !noteActive);
      fileForm.classList.toggle("hidden", noteActive);
    }

    function randomStartPosition() {
      const x = boardWrap.scrollLeft + boardWrap.clientWidth / 2 - 140 + (Math.random() * 140 - 70);
      const y = boardWrap.scrollTop + boardWrap.clientHeight / 2 - 100 + (Math.random() * 140 - 70);
      return {
        x: Math.round(clamp(x, 20, 1900)),
        y: Math.round(clamp(y, 20, 1200))
      };
    }

    function resetForm() {
      noteTitle.value = "";
      noteText.value = "";
      noteColor.value = "yellow";
      fileInput.value = "";
      fileTitle.value = "";
      setMode("note");
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function bringToFront(id, currentZ = 1) {
      if (currentZ >= highestZ) return;
      highestZ += 1;
      try {
        await updateDoc(doc(db, "boardItems", id), {
          z: highestZ,
          updatedAt: serverTimestamp()
        });
      } catch (err) {
        console.error(err);
      }
    }

    function attachItemEvents(el, id, data) {
      el.addEventListener("pointerdown", async (e) => {
        await bringToFront(id, data.z || 1);

        drag = {
          id,
          el,
          startX: e.clientX,
          startY: e.clientY,
          originX: parseFloat(el.style.left) || 0,
          originY: parseFloat(el.style.top) || 0
        };

        el.setPointerCapture(e.pointerId);
      });

      el.addEventListener("click", async () => {
        await bringToFront(id, data.z || 1);
      });
    }

    function makeNoteElement(id, data) {
      const el = document.createElement("div");
      el.className = `note ${data.color || "yellow"}`;
      el.dataset.id = id;
      el.style.left = `${data.x || 40}px`;
      el.style.top = `${data.y || 40}px`;
      el.style.zIndex = data.z || 1;

      el.innerHTML = `
        <div class="note-title">${escapeHtml(data.title || "")}</div>
        <div class="note-body">${escapeHtml(data.text || "")}</div>
      `;

      attachItemEvents(el, id, data);
      return el;
    }

    function makeFileElement(id, data) {
      const el = document.createElement("div");
      el.className = "file-card";
      el.dataset.id = id;
      el.style.left = `${data.x || 60}px`;
      el.style.top = `${data.y || 60}px`;
      el.style.zIndex = data.z || 1;

      const isPdf = data.fileType === "pdf";
      const label = data.label || data.fileName || (isPdf ? "PDF" : "PNG");

      el.innerHTML = `
        <div class="file-head">
          <div class="file-name">${escapeHtml(label)}</div>
          <div>${isPdf ? "PDF" : "PNG"}</div>
        </div>
        <div class="file-body">
          ${
            isPdf
              ? `<iframe class="pdf-frame" src="${data.fileData}#toolbar=0&navpanes=0"></iframe>`
              : `<img src="${data.fileData}" alt="${escapeHtml(label)}" />`
          }
        </div>
      `;

      attachItemEvents(el, id, data);
      return el;
    }

    function renderItem(id, data) {
      let el = itemsMap.get(id);
      const newEl = data.type === "note" ? makeNoteElement(id, data) : makeFileElement(id, data);

      if (el) {
        board.replaceChild(newEl, el);
      } else {
        board.appendChild(newEl);
      }

      itemsMap.set(id, newEl);
      highestZ = Math.max(highestZ, data.z || 1);
    }

    function removeItem(id) {
      const el = itemsMap.get(id);
      if (el) el.remove();
      itemsMap.delete(id);
    }

    async function createNote() {
      const title = noteTitle.value.trim();
      const text = noteText.value.trim();
      const color = noteColor.value;

      if (!title && !text) {
        alert("Write something first.");
        return;
      }

      const pos = randomStartPosition();
      highestZ += 1;

      await addDoc(itemsRef, {
        type: "note",
        title,
        text,
        color,
        x: pos.x,
        y: pos.y,
        z: highestZ,
        createdBy: currentUid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    async function createFileItem() {
      const file = fileInput.files[0];
      if (!file) {
        alert("Choose a PNG or PDF.");
        return;
      }

      const isPng = file.type === "image/png" || file.name.toLowerCase().endsWith(".png");
      const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");

      if (!isPng && !isPdf) {
        alert("Only PNG and PDF are allowed.");
        return;
      }

      if (file.size > 700 * 1024) {
        alert("This Firestore-only version only supports small files. Keep it under about 700 KB.");
        return;
      }

      const dataUrl = await fileToDataUrl(file);

      if (typeof dataUrl !== "string" || dataUrl.length > 900000) {
        alert("That file is too large to store safely in Firestore.");
        return;
      }

      const pos = randomStartPosition();
      highestZ += 1;

      await addDoc(itemsRef, {
        type: "file",
        label: fileTitle.value.trim(),
        fileName: file.name,
        fileType: isPdf ? "pdf" : "png",
        fileData: dataUrl,
        x: pos.x,
        y: pos.y,
        z: highestZ,
        createdBy: currentUid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    async function submitPost() {
      submitBtn.disabled = true;
      setStatus("Posting...");

      try {
        if (mode === "note") {
          await createNote();
        } else {
          await createFileItem();
        }

        closeModal();
        resetForm();
        setStatus("Live");
      } catch (err) {
        console.error(err);
        alert("Could not create post.");
        setStatus("Error");
      } finally {
        submitBtn.disabled = false;
      }
    }

    window.addEventListener("pointermove", (e) => {
      if (!drag) return;

      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      const x = clamp(Math.round(drag.originX + dx), 0, board.scrollWidth - 80);
      const y = clamp(Math.round(drag.originY + dy), 0, board.scrollHeight - 80);

      drag.el.style.left = `${x}px`;
      drag.el.style.top = `${y}px`;
    });

    window.addEventListener("pointerup", async () => {
      if (!drag) return;

      const { id, el } = drag;
      const x = parseInt(el.style.left, 10) || 0;
      const y = parseInt(el.style.top, 10) || 0;
      drag = null;

      try {
        await updateDoc(doc(db, "boardItems", id), {
          x,
          y,
          updatedAt: serverTimestamp()
        });
      } catch (err) {
        console.error(err);
      }
    });

    openPostBtn.addEventListener("click", openModal);
    closeModalBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);
    submitBtn.addEventListener("click", submitPost);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    tabNote.addEventListener("click", () => setMode("note"));
    tabFile.addEventListener("click", () => setMode("file"));

    async function boot() {
      setStatus("Signing in...");

      try {
        await signInAnonymously(auth);
      } catch (err) {
        console.error(err);
        setStatus("Auth failed");
        alert("Enable Anonymous Authentication in Firebase.");
        return;
      }

      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        currentUid = user.uid;
        setStatus("Live");

        const q = query(itemsRef, orderBy("z", "asc"));
        onSnapshot(q, (snap) => {
          snap.docChanges().forEach((change) => {
            const id = change.doc.id;
            const data = change.doc.data();

            if (change.type === "removed") {
              removeItem(id);
            } else {
              renderItem(id, data);
            }
          });
        }, (err) => {
          console.error(err);
          setStatus("Sync error");
        });

        boardWrap.scrollLeft = (board.scrollWidth - boardWrap.clientWidth) / 2;
        boardWrap.scrollTop = (board.scrollHeight - boardWrap.clientHeight) / 2;
      });
    }

    boot();
  </script>
</body>
</html>
